packages:
  "framer-motion": "For fluid page transitions and micro-interactions"
  "recharts": "For HOD analytics and data visualization"
  "date-fns": "For formatting timetable and attendance dates"
  "qrcode.react": "For Staff QR code generation"
  "react-qr-barcode-scanner": "For Student QR scanning"
  "lucide-react": "For beautiful crisp icons"
  "react-hook-form": "For form state management"
  "@hookform/resolvers": "For zod validation integration"
  "zod": "For form schema validation"
  "clsx": "Utility for constructing className strings conditionally"
  "tailwind-merge": "Utility for merging tailwind classes safely"

images:
  - path: "artifacts/classroom/public/images/auth-bg.png"
    description: "Abstract modern geometric gradient mesh in deep indigo, violet, and bright blue colors, clean corporate educational technology style, soft lighting"
    aspect_ratio: "16:9"
  - path: "artifacts/classroom/public/images/dashboard-pattern.png"
    description: "Subtle clean geometric dot pattern on a transparent background, professional and minimal"
    aspect_ratio: "16:9"

notes:
  - "Assuming customFetch in @workspace/api-client-react reads 'auth_token' from localStorage or uses cookies."
  - "API paths are all under /api"
  - "The App handles 3 distinct roles: STAFF, HOD, STUDENT"
